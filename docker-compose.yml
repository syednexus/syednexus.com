services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_dev_password
      POSTGRES_DB: syednexus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d syednexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nexus-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nexus:nexus_dev_password@postgres:5432/syednexus?sslmode=disable
      DIRECT_URL: postgresql://nexus:nexus_dev_password@postgres:5432/syednexus?sslmode=disable
      NEXTAUTH_SECRET: change-me-in-production-min-32-chars
      NEXTAUTH_URL: http://localhost:3000
      NEXUS_SECRET: change-me-in-production-min-32-chars
      OWNER_EMAIL: owner@example.com
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      UPSTASH_REDIS_REST_URL: ""
      UPSTASH_REDIS_REST_TOKEN: ""
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--header=x-docker-healthcheck: 1", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s

volumes:
  postgres_data:
